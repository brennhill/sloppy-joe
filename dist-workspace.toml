[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# We manually customize the generated release workflow to enforce an
# auditable-binary gate before publication.
allow-dirty = ["ci"]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.2"
# CI backends to support
ci = "github"
# Build auditable binaries so release artifacts can be checked with
# `cargo audit bin` before publication.
cargo-auditable = false
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-musl",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
]
# Where to host releases
hosting = "github"
