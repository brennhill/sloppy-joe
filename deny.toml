[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
    { crate = "windows-sys@0.52.0", reason = "Pinned transitively by rustls/ring on non-Windows targets." },
    { crate = "windows-sys@0.59.0", reason = "Pinned transitively by colored while clap and tokio already require newer windows-sys." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
