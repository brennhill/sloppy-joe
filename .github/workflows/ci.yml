name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run nextest
        run: cargo nextest run --all-features

      - name: Run doctests
        run: cargo test --doc

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check dependency policy
        run: cargo deny check

  cargo-geiger:
    name: cargo-geiger
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-geiger
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-geiger

      - name: Confirm first-party unsafe policy
        shell: bash
        run: |
          set -euo pipefail
          grep -n '^#!\[forbid(unsafe_code)\]$' src/lib.rs src/main.rs > cargo-geiger-policy.txt

      - name: Generate unsafe reports
        shell: bash
        run: |
          set -uo pipefail
          CARGO_TERM_COLOR=never cargo geiger --quiet --all-features --output-format GitHubMarkdown > cargo-geiger-report.md 2> cargo-geiger.stderr || true
          grep -E '^(Failed to match|Failed to parse file|WARNING: Dependency file was never scanned:|\{"\$message_type":"artifact"|error: Found [0-9]+ warnings$)' cargo-geiger.stderr > cargo-geiger-known-noise.txt || true
          grep -Ev '^(Failed to match|Failed to parse file|WARNING: Dependency file was never scanned:|\{"\$message_type":"artifact"|error: Found [0-9]+ warnings$)' cargo-geiger.stderr > cargo-geiger-unexpected.txt || true

      - name: Summarize cargo-geiger output
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_lines=$(wc -l < cargo-geiger-report.md)
          stderr_lines=$(wc -l < cargo-geiger.stderr)
          known_noise_lines=$(wc -l < cargo-geiger-known-noise.txt)
          unexpected_lines=$(wc -l < cargo-geiger-unexpected.txt)
          {
            echo "## cargo-geiger"
            echo
            echo "- policy: workspace crate roots explicitly use \`#![forbid(unsafe_code)]\`"
            echo "- report: \`${report_lines}\` lines in \`cargo-geiger-report.md\`"
            echo "- stderr: \`${stderr_lines}\` lines"
            echo "- known cargo-geiger noise: \`${known_noise_lines}\` lines"
            echo "- unexpected stderr: \`${unexpected_lines}\` lines"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload geiger report
        uses: actions/upload-artifact@v4
        with:
          name: cargo-geiger-report
          path: |
            cargo-geiger-policy.txt
            cargo-geiger-report.md
            cargo-geiger.stderr
            cargo-geiger-known-noise.txt
            cargo-geiger-unexpected.txt
