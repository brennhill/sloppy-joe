name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run nextest
        run: cargo nextest run --all-features

      - name: Run doctests
        run: cargo test --doc

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: cargo-deny

      - name: Check dependency policy
        run: cargo deny check

  sloppy-joe:
    name: sloppy-joe self-check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build sloppy-joe
        run: cargo build --release --locked

      - name: Stage self-check config
        run: install -m 0644 .github/sloppy-joe-self-check.json /tmp/sloppy-joe-self-check.json

      - name: Stage self-check workspace
        run: |
          mkdir -p /tmp/sloppy-joe-self-check
          install -m 0644 Cargo.toml /tmp/sloppy-joe-self-check/Cargo.toml
          install -m 0644 Cargo.lock /tmp/sloppy-joe-self-check/Cargo.lock

      - name: Check own dependencies
        working-directory: /tmp/sloppy-joe-self-check
        run: ${{ github.workspace }}/target/release/sloppy-joe check --ci --no-cache --type cargo --config /tmp/sloppy-joe-self-check.json
